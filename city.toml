[city]
name = "poc-city"
version = "1.0.0"

[runtime.defaults]
heartbeat_interval = "30s"
startup_timeout = "60s"

[runtime.port_range]
min = 8080
max = 9000

# Agent registry
# Each agent's role maps to a directory in config/{role}/

[[agents]]
id = "mayor"
role = "mayor"           # Maps to config/mayor/
cmd = "mayor"            # Container command
skills = ["orchestration", "delegation", "answering"]

[[agents]]
id = "engineer"
role = "engineer"        # Maps to config/engineer/
cmd = "engineer"         # Container command
skills = ["coding", "testing", "building"]

[network]
mayor_url = "http://localhost:8081"
engineer_url = "http://localhost:8084"