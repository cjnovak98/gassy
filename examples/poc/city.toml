# City Configuration
# Defines the city's agents and their runtime configuration.
# Role definitions (skills, prompts) come from config/{role}/ directory.

[city]
name = "poc-city"
version = "1.0.0"

# Default runtime settings
[runtime.defaults]
heartbeat_interval = "30s"
startup_timeout = "60s"

# Port range for agent allocation
[runtime.port_range]
min = 8080
max = 9000

# Agent registry
# Each agent's role maps to a directory in config/{role}/

[[agents]]
id = "mayor"
role = "mayor"           # Maps to config/mayor/
cmd = "mayor"            # Container command

[[agents]]
id = "engineer"
role = "engineer"        # Maps to config/engineer/
cmd = "engineer"         # Container command

# Network configuration (for discovery)
[network]
# Agent URLs are assigned dynamically from port_range
# Use supervisor registry for discovery: GET /registry/discover?skill={skill}